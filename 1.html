<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기사 페이지</title>
  <style>
    /* 읽기 편하게 최소한의 간격만 추가했습니다. */
    body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; overflow-x: hidden; }
    main { display: flex; gap: 20px; } /* 본문과 사이드바 가로 배치 */
    article { flex: 3; transition: transform 0.1s ease-out; }
    aside { flex: 1; background: #f0f0f0; padding: 10px; transition: transform 0.1s ease-out; }
    header { transition: transform 0.1s ease-out; }
    footer { margin-top: 20px; border-top: 1px solid #ccc; text-align: center; transition: transform 0.1s ease-out; }

    /* 커서 조명 효과 */
    #cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(120, 80, 220, 0.15) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      transition: left 0.05s ease-out, top 0.05s ease-out;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="#home">홈</a>
    </nav>
  </header>

  <main>
    <article>
      <h1>안녕하세요</h1>
      <section>
        <p>내용이 들어가는 곳입니다.</p>
      </section>
    </article>

    <aside>
      관련 정보
    </aside>
  </main>

  <footer>
    <p>&copy; 2026 전세영</p>
  </footer>

  <div id="cursor-glow"></div>

  <script>
    const glow = document.getElementById('cursor-glow');
    const article = document.querySelector('article');
    const aside = document.querySelector('aside');
    const header = document.querySelector('header');
    const footer = document.querySelector('footer');

    document.addEventListener('mousemove', (e) => {
      const cx = e.clientX;
      const cy = e.clientY;

      // 커서 조명 위치 업데이트
      glow.style.left = cx + 'px';
      glow.style.top = cy + 'px';

      // 패럴랙스: 화면 중심 기준으로 오프셋 계산
      const xRatio = (cx / window.innerWidth - 0.5);
      const yRatio = (cy / window.innerHeight - 0.5);

      header.style.transform  = `translate(${xRatio * 10}px, ${yRatio * 5}px)`;
      article.style.transform = `translate(${xRatio * 15}px, ${yRatio * 10}px)`;
      aside.style.transform   = `translate(${xRatio * -10}px, ${yRatio * -8}px)`;
      footer.style.transform  = `translate(${xRatio * 8}px, ${yRatio * 4}px)`;
    });
  </script>

</body>
</html>
