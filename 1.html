<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기사 페이지</title>
  <style>
    body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; overflow-x: hidden; }
    main { display: flex; gap: 20px; }
    article { flex: 3; }
    aside { flex: 1; background: #f0f0f0; padding: 10px; }
    footer { margin-top: 20px; border-top: 1px solid #ccc; text-align: center; }

    /* 패럴랙스 */
    header, article, aside, footer {
      transition: transform 0.1s ease-out;
      will-change: transform;
    }

    /* 랜턴 효과: 마우스 주변만 보이고 나머지는 어두움 */
    #lantern {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: radial-gradient(circle 150px at var(--cx, -999px) var(--cy, -999px),
        transparent 0%,
        transparent 40%,
        rgba(0, 0, 0, 0.92) 100%
      );
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="#home">홈</a>
    </nav>

  </header>

  <main>
    <article>
      <h1>안녕하세요</h1>
      <section>
        <p>내용이 들어가는 곳입니다.</p>
      </section>
    </article>

    <aside>
      관련 정보
    </aside>
  </main>

  <footer>
    <p>&copy; 2026 전세영</p>
  </footer>

  <div id="lantern"></div>

  <script>
    const lantern = document.getElementById('lantern');
    const header  = document.querySelector('header');
    const article = document.querySelector('article');
    const aside   = document.querySelector('aside');
    const footer  = document.querySelector('footer');

    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;

    // 배경색 애니메이션
    let hue = 0;
    function animateBg() {
      hue = (hue + 0.3) % 360;
      document.body.style.background =
        `hsl(${hue}, 60%, 85%)`;
      requestAnimationFrame(animateBg);
    }
    animateBg();

    // 마우스 이벤트
    document.addEventListener('mousemove', (e) => {
      // 랜턴
      lantern.style.setProperty('--cx', e.clientX + 'px');
      lantern.style.setProperty('--cy', e.clientY + 'px');

      // 패럴랙스
      const dx = (e.clientX - cx) / cx; // -1 ~ 1
      const dy = (e.clientY - cy) / cy;

      header .style.transform = `translate(${dx * 12}px, ${dy * 6}px)`;
      article.style.transform = `translate(${dx * -8}px, ${dy * -10}px)`;
      aside  .style.transform = `translate(${dx * 15}px, ${dy * 8}px)`;
      footer .style.transform = `translate(${dx * -5}px, ${dy * 4}px)`;
    });
  </script>

</body>
</html>
